
name: Note Auto Post
on:
  schedule:
    - cron: '0 12 * * *' # 毎日日本時間の21:00（UTC 12:00）に実行

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.9'
      - name: Install dependencies
        run: |
          pip install playwright
          playwright install chromium
      - name: Run script
        env:
          NOTE_EMAIL: ${{ secrets.NOTE_EMAIL }}
          NOTE_PASS: ${{ secrets.NOTE_PASS }}
        run: python publish_note.py
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libatk-1.0-0 libatk-bridge2.0-0 libxkbcommon0 libgdk-pixbuf2.0-0 libpango-1.0-0 libpangoft2-1.0-0 libharfbuzz0b libdbus-1-3 libgtk-3-0 libnss3 libnspr4 libxss1 libasound2
