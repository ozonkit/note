name: Note Auto Post
on:
  workflow_dispatch:
  schedule:
    - cron: '0 12 * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.9'
      - name: Install dependencies
        run: |
          pip install playwright
          playwright install chromium
      - name: Debug - Check files
        run: |
          echo "Current directory:"
          pwd
          echo "Files in current directory:"
          ls -la
          echo "publish_note.py exists:"
          test -f publish_note.py && echo "YES" || echo "NO"
      - name: Run script
        env:
          NOTE_EMAIL: ${{ secrets.NOTE_EMAIL }}
          NOTE_PASS: ${{ secrets.NOTE_PASS }}
          TEST_MODE: "true"
          PYTHONUNBUFFERED: "1"  # ← 追加！バッファリングを無効化
        run: python -u publish_note.py  # ← -u フラグを追加
